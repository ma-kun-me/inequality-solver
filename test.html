<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社サンプル | 映像制作 & 医療システム開発</title>
    <style>
        /* --- デザインベース・カラー設定 --- */
        :root {
            --bg-color: #0b0c10;       /* 漆黒（やや青みのある深い黒） */
            --card-bg: #1f2833;        /* ダークメタリックグレー */
            --text-main: #ffffff;      /* メインテキスト */
            --text-sub: #c5c6c7;       /* サブテキスト */
            /* ユニークなネオングラデーション（医療の青 × 映像の紫） */
            --accent-blue: #66fcf1;    
            --accent-purple: #b388ff;
            --grad-accent: linear-gradient(135deg, #66fcf1 0%, #b388ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* --- レイアウト構造 --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        section {
            padding: 120px 0;
            position: relative;
        }

        /* ユニークなタイポグラフィ */
        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 80px;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* --- ヘッダー --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(102, 252, 241, 0.1);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-links a {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        /* --- メインビジュアル（シネマティック演出） --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: radial-gradient(circle at 80% 20%, rgba(179, 136, 255, 0.15) 0%, rgba(11, 12, 16, 1) 60%);
            border-top: 20px solid #000; /* シネマスコープ（黒帯）をイメージ */
            border-bottom: 20px solid #000;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 25px;
            letter-spacing: -0.02em;
        }

        .hero-content h1 span {
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            color: var(--text-sub);
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 600px;
        }

        /* サイバー感のあるボタン */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            position: relative;
            background: transparent;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border: 1px solid var(--accent-blue);
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--grad-accent);
            transition: left 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            border-color: transparent;
            color: #000;
        }

        /* --- ビジョン (ABOUT) --- */
        .vision-layout {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .vision-left h3 {
            font-size: 2rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .vision-right {
            color: var(--text-sub);
            border-left: 2px solid var(--accent-purple);
            padding-left: 30px;
        }

        /* --- 2大事業内容 (SERVICES - アシンメトリー配置) --- */
        .service-layout {
            display: flex;
            flex-direction: column;
            gap: 150px;
        }

        .service-row {
            display: flex;
            align-items: center;
            gap: 80px;
        }

        .service-row.reverse {
            flex-direction: row-reverse;
        }

        .service-num {
            font-size: 6rem;
            font-weight: 900;
            font-family: monospace;
            opacity: 0.15;
            background: var(--grad-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .service-info {
            flex: 1;
        }

        .service-info h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 医療側のドットマーカー */
        .service-info h3::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--accent-blue);
        }
        /* 映像側のマーカー（四角に反転） */
        .service-row.reverse .service-info h3::before {
            background-color: var(--accent-purple);
            border-radius: 0;
            transform: rotate(45deg);
        }

        .service-info p {
            color: var(--text-sub);
        }

        .tag-list {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: var(--accent-blue);
        }

        .service-row.reverse .tag {
            color: var(--accent-purple);
        }

        /* --- 会社情報 (COMPANY) --- */
        .company-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .company-item {
            display: contents;
        }

        .company-label, .company-value {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .company-label {
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 0.1em;
        }

        /* --- フッター --- */
        footer {
            background-color: #050507;
            padding: 60px 0;
            text-align: center;
            border-top: 1px solid rgba(102, 252, 241, 0.05);
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.1em;
        }

        /* --- レスポンシブ対応 --- */
        @media (max-width: 968px) {
            .nav-links { display: none; }
            .hero-content h1 { font-size: 2.8rem; }
            .vision-layout { flex-direction: column; gap: 30px; }
            .service-row, .service-row.reverse { flex-direction: column; gap: 30px; align-items: flex-start; }
            .service-num { font-size: 4rem; }
            .service-layout { gap: 80px; }
            .company-grid { grid-template-columns: 1fr; }
            .company-label { padding-bottom: 5px; border-bottom: none; }
            .company-value { padding-top: 5px; }
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <div class="container header-inner">
            <div class="logo">NEO_MATRIX</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#vision">Vision</a></li>
                    <li><a href="#core-business">Business</a></li>
                    <li><a href="#company">Company</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- メインビジュアル -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>感情を揺さぶる<span>映像</span>と、<br>命を支える<span>システム</span>を。</h1>

                <a href="#contact" class="btn">Launch Project</a>
            </div>
        </div>
    </section>

        <div class="container">
            <h2 class="section-title">Our Vision</h2>
            <div class="vision-layout">
